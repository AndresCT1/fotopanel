<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a5f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FotoPanel" />
    <meta name="description" content="Generador de paneles fotográficos para obras e instalaciones" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>FotoPanel</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function () {
        var p = new URLSearchParams(location.search).get('empresa');
        var cfg = {
          ingenious: {
            manifest: '/manifest-ingenious.json',
            theme: '#1e3a5f',
            icon192: '/logos/ic_icon_192.png',
          },
          bryjhocar: {
            manifest: '/manifest-bryjhocar.json',
            theme: '#8B1A1A',
            icon192: '/logos/bjc_icon_192.png',
          },
        };
        if (!p || !cfg[p]) return;
        var c = cfg[p];
        var ml = document.querySelector('link[rel="manifest"]');
        if (ml) ml.setAttribute('href', c.manifest);
        var tc = document.querySelector('meta[name="theme-color"]');
        if (tc) tc.setAttribute('content', c.theme);
        var ai = document.querySelector('link[rel="apple-touch-icon"]');
        if (ai) ai.setAttribute('href', c.icon192);
      })();
    </script>
  </body>
</html>
